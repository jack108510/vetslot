<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f172a"/>

  <!-- Green accent bar on left -->
  <rect x="0" y="0" width="8" height="630" fill="#16a34a"/>

  <!-- Slot graphic (centered left area) -->
  <rect x="100" y="200" width="180" height="22" rx="11" fill="rgba(255,255,255,0.12)"/>
  <rect x="100" y="240" width="220" height="22" rx="11" fill="#16a34a"/>
  <circle cx="310" cy="251" r="8" fill="white" opacity="0.9"/>
  <rect x="100" y="280" width="140" height="22" rx="11" fill="rgba(255,255,255,0.12)"/>

  <!-- Wordmark -->
  <text x="100" y="170" font-family="'Inter', -apple-system, sans-serif" font-size="72" font-weight="900" letter-spacing="-3" fill="white">empty<tspan fill="#16a34a">slot</tspan></text>

  <!-- Tagline -->
  <text x="100" y="370" font-family="'Inter', -apple-system, sans-serif" font-size="32" font-weight="500" fill="rgba(255,255,255,0.55)">Get alerted when a vet near you has a last-minute opening.</text>

  <!-- URL -->
  <text x="100" y="530" font-family="'Inter', -apple-system, sans-serif" font-size="24" font-weight="600" fill="#16a34a">emptyslot.ca</text>

  <!-- Free badge -->
  <rect x="100" y="440" width="130" height="44" rx="22" fill="#16a34a" opacity="0.15"/>
  <rect x="100" y="440" width="130" height="44" rx="22" fill="none" stroke="#16a34a" stroke-width="1.5"/>
  <text x="165" y="468" font-family="'Inter', -apple-system, sans-serif" font-size="16" font-weight="700" fill="#16a34a" text-anchor="middle">Free to join</text>
</svg>
